name: Build desktop apps

# Builds native Mnemo Med installers on macOS, Windows, and Linux runners and
# publishes them to a GitHub Release. Trigger manually (Actions → Run workflow)
# or by pushing a tag like `desktop-v1.0.0`.
on:
  workflow_dispatch:
  push:
    tags: ["desktop-v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest # Apple Silicon + Intel (universal)
            args: "--target universal-apple-darwin"
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux WebView dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Install frontend dependencies
        run: npm ci

      - name: Build & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: desktop-v__VERSION__
          releaseName: "Mnemo Med Desktop v__VERSION__"
          releaseBody: "Native desktop builds of Mnemo Med (unsigned). macOS .dmg, Windows .msi/.exe, Linux .AppImage/.deb."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
