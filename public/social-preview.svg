    <rect x="170" width="146" height="42" rx="21" fill="white" opacity="0.075" stroke="white" stroke-opacity="0.12"/>
    <text x="194" y="27" fill="#e2e8f0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="15" font-weight="700">Offline PWA</text>
    <rect x="332" width="176" height="42" rx="21" fill="white" opacity="0.075" stroke="white" stroke-opacity="0.12"/>
    <text x="356" y="27" fill="#e2e8f0" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="15" font-weight="700">Evidence-ranked</text>
