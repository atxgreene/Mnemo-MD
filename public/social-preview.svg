<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Mnemo Med social preview</title>
  <desc id="desc">A branded preview card for Mnemo Med.</desc>
  <defs>
    <linearGradient id="g" x1="120" y1="80" x2="1080" y2="560" gradientUnits="userSpaceOnUse">
      <stop stop-color="#67e8f9"/>
      <stop offset="0.46" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="r" cx="72%" cy="15%" r="70%">
      <stop stop-color="#67e8f9" stop-opacity="0.32"/>
      <stop offset="0.42" stop-color="#5eead4" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#050814" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0V48" fill="none" stroke="white" stroke-opacity="0.055"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#050814"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#r)"/>
  <circle cx="1030" cy="72" r="260" fill="#a78bfa" opacity="0.14"/>
  <circle cx="135" cy="580" r="340" fill="#5eead4" opacity="0.11"/>

  <g transform="translate(88 82)">
