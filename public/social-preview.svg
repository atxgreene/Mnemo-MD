    <path d="M33 86V40c0-5 6-7 9-3l20 22 20-22c3-4 9-2 9 3v46" fill="none" stroke="url(#g)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M43 86h38M62 59v27" fill="none" stroke="url(#g)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  </g>

  <text x="240" y="143" fill="#f8fafc" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="64" font-weight="780" letter-spacing="-2.4">Mnemo Med</text>
