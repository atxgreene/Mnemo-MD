  <text x="88" y="318" fill="#ffffff" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="68" font-weight="760" letter-spacing="-3.2">Study from your actual notes.</text>
  <text x="88" y="380" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="32" font-weight="470">Verified review sheets, Anki cards, practice exams,</text>
  <text x="88" y="424" fill="#cbd5e1" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif" font-size="32" font-weight="470">and cram plans — local-first and offline-ready.</text>

